// ═══════════════════════════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════════════════════════
function parseCSV(text) {
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  const rows = [];
  let current = "";
  for (const line of lines) {
    if (line.startsWith('"') && current) { rows.push(current.trim()); current = line; }
    else current += " " + line;
  }
  if (current) rows.push(current.trim());
  const parsed = [];
  for (let i = 1; i < rows.length; i++) {
    let row = rows[i].replace(/^"|"$/g, "");
    const fields = row.split(/,""/).map(f => f.replace(/^"|"$/g, "").trim());
    if (fields.length >= 6 && fields[0]) {
      parsed.push({ first_name: fields[0], last_name: fields[1], headline: fields[2], location: fields[3], title: fields[4], company: fields[5], active_project: fields[9] || "" });
    }
  }
  return parsed;
}

function countBy(arr, fn) {
  const c = {};
  arr.forEach(item => { const k = fn(item); c[k] = (c[k] || 0) + 1; });
  return Object.entries(c).sort((a, b) => b[1] - a[1]);
}

function HBar({ data, maxItems = 8, dark = false, mint = false }) {
  const items = data.slice(0, maxItems);
  if (!items.length) return null;
  const maxVal = Math.max(...items.map(d => d[1]));
  const total = items.reduce((s, d) => s + d[1], 0);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1, justifyContent: "center" }}>
      {items.map(([label, val], i) => {
        const pct = ((val / total) * 100).toFixed(0);
        const barPct = ((val / maxVal) * 100).toFixed(0);
        const color = dark ? `hsl(${140 + i * 8}, ${65 - i * 3}%, ${40 + i * 6}%)` : BAR_SHADES[Math.min(i, 9)];
        return (
          <div key={label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 110, textAlign: "right", fontSize: 11, color: dark ? "#A0C8B0" : COLORS.dark, flexShrink: 0, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{label}</div>
            <div style={{ flex: 1, height: 14, background: dark ? "rgba(255,255,255,0.06)" : mint ? "rgba(26,60,52,0.06)" : "rgba(26,60,52,0.04)", borderRadius: 7 }}>
              <div style={{ width: `${barPct}%`, minWidth: 4, height: "100%", borderRadius: 7, background: color, transition: "width 0.6s ease" }} />
            </div>
            <div style={{ width: 65, fontSize: 10, fontWeight: 700, color: dark ? "#fff" : COLORS.gray, flexShrink: 0 }}>{val} ({pct}%)</div>
          </div>
        );
      })}
    </div>
  );
}

function DonutChart({ data, total }) {
  const items = data.slice(0, 7);
  let cumAngle = -90;
  const size = 140, cx = 70, cy = 70, R = 62, r = 35;
  const paths = items.map(([, val], i) => {
    const angle = (val / total) * 360;
    const startRad = (cumAngle * Math.PI) / 180;
    const endRad = ((cumAngle + angle) * Math.PI) / 180;
    cumAngle += angle;
    const large = angle > 180 ? 1 : 0;
    const x1 = cx + R * Math.cos(startRad), y1 = cy + R * Math.sin(startRad);
    const x2 = cx + R * Math.cos(endRad), y2 = cy + R * Math.sin(endRad);
    const x3 = cx + r * Math.cos(endRad), y3 = cy + r * Math.sin(endRad);
    const x4 = cx + r * Math.cos(startRad), y4 = cy + r * Math.sin(startRad);
    return <path key={i} d={`M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${r},${r} 0 ${large} 0 ${x4},${y4} Z`} fill={BAR_SHADES[Math.min(i, 9)]} stroke={COLORS.cream} strokeWidth={2} />;
  });
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {paths}
        <circle cx={cx} cy={cy} r={r - 2} fill={COLORS.cream} />
        <text x={cx} y={cy - 2} textAnchor="middle" fontSize="20" fontWeight="700" fill={COLORS.dark}>{total}</text>
        <text x={cx} y={cy + 12} textAnchor="middle" fontSize="8" fill={COLORS.gray}>attendees</text>
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 4, fontSize: 10.5 }}>
        {items.map(([label, val], i) => (
          <div key={label} style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: BAR_SHADES[Math.min(i, 9)], flexShrink: 0 }} />
            <span style={{ color: COLORS.dark }}>{label} <span style={{ color: COLORS.gray }}>({val}, {((val/total)*100).toFixed(0)}%)</span></span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// SIMPLE MARKDOWN RENDERER FOR CHAT
// ═══════════════════════════════════════════════════════════════
function renderMarkdown(text) {
  if (!text) return null;
  const lines = text.split("\n");
  const elements = [];
  let i = 0;

  function inlineFormat(str) {
    // Bold **text** or __text__
    const parts = [];
    const regex = /\*\*(.+?)\*\*/g;
    let last = 0;
    let match;
    while ((match = regex.exec(str)) !== null) {
      if (match.index > last) parts.push(str.slice(last, match.index));
      parts.push(<b key={match.index}>{match[1]}</b>);
      last = regex.lastIndex;
    }
    if (last < str.length) parts.push(str.slice(last));
    return parts.length ? parts : str;
  }

  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    // Skip empty lines
    if (!trimmed) { i++; continue; }

    // H1
    if (trimmed.startsWith("# ") && !trimmed.startsWith("##")) {
      elements.push(<div key={i} style={{ fontSize: 13, fontWeight: 700, color: COLORS.dark, marginTop: 8, marginBottom: 4 }}>{inlineFormat(trimmed.slice(2))}</div>);
      i++; continue;
    }
    // H2
    if (trimmed.startsWith("## ")) {
      elements.push(<div key={i} style={{ fontSize: 12, fontWeight: 700, color: COLORS.mid, marginTop: 8, marginBottom: 2, borderBottom: `1px solid ${COLORS.border}`, paddingBottom: 3 }}>{inlineFormat(trimmed.slice(3))}</div>);
      i++; continue;
    }
    // H3
    if (trimmed.startsWith("### ")) {
      elements.push(<div key={i} style={{ fontSize: 11.5, fontWeight: 700, color: COLORS.dark, marginTop: 6, marginBottom: 2 }}>{inlineFormat(trimmed.slice(4))}</div>);
      i++; continue;
    }
    // Bullet or numbered list
    if (/^[-*•]\s/.test(trimmed) || /^\d+\.\s/.test(trimmed)) {
      const bullet = /^\d+\.\s/.test(trimmed) ? trimmed.match(/^(\d+)\./)[1] + "." : "·";
      const content = trimmed.replace(/^[-*•]\s|^\d+\.\s/, "");
      elements.push(
        <div key={i} style={{ display: "flex", gap: 6, marginTop: 2, fontSize: 11, lineHeight: 1.5 }}>
          <span style={{ color: COLORS.mid, flexShrink: 0, fontWeight: 600, minWidth: 12 }}>{bullet}</span>
          <span>{inlineFormat(content)}</span>
        </div>
      );
      i++; continue;
    }
    // Horizontal rule
    if (/^---+$/.test(trimmed)) {
      elements.push(<hr key={i} style={{ border: "none", borderTop: `1px solid ${COLORS.border}`, margin: "6px 0" }} />);
      i++; continue;
    }
    // Regular paragraph
    elements.push(<div key={i} style={{ fontSize: 11, lineHeight: 1.6, marginTop: 3 }}>{inlineFormat(trimmed)}</div>);
    i++;
  }
  return elements;
}

              <Card title="" variant="bordered">
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", background: COLORS.mid, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700 }}>4</div>
                  <span style={{ fontWeight: 700, color: COLORS.dark, fontSize: 13 }}>COVERAGE GAPS & HIRING NEEDS</span>
                </div>
                <div style={{ fontSize: 11, color: COLORS.mid, fontWeight: 600, marginBottom: 6 }}>ACTION: Address geographic blind spots.</div>
                <div style={{ fontSize: 11, color: COLORS.gray, lineHeight: 1.6 }}>
                  {(() => { const r = Object.fromEntries(a.regions); return `Asia-Pacific: ${r["Asia-Pacific"]||0} (${(((r["Asia-Pacific"]||0)/a.total)*100).toFixed(0)}%) · North America: ${r["North America"]||0} (${(((r["North America"]||0)/a.total)*100).toFixed(0)}%)`; })()}
                </div>
              </Card>
            </div>
          </div>
        )}

        {/* ═══════ METHODOLOGY TAB ═══════ */}
        {tab === "methodology" && (
          <div style={{ marginTop: 14, display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ fontSize: 12, color: COLORS.gray, lineHeight: 1.6 }}>
              Full transparency on how every metric is calculated. Each classification uses a deterministic, keyword-based approach — same data always produces the same output. Click any metric to expand.
            </div>
            {METHODOLOGY.map((group, gi) => (
              <div key={gi}>
                <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: COLORS.mid, marginBottom: 8, paddingBottom: 6, borderBottom: `1px solid ${COLORS.border}` }}>{group.section}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {group.items.map((m, mi) => {
                    const key = `${gi}-${mi}`;
                    return (
                      <div key={key} style={{ background: "#fff", borderRadius: 8, borderLeft: `3px solid ${COLORS.mid}`, overflow: "hidden" }}>
                        <button onClick={() => setMethodOpen(methodOpen === key ? null : key)} style={{ width: "100%", padding: "10px 14px", border: "none", background: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", fontFamily: "inherit" }}>
                          <span style={{ fontWeight: 600, fontSize: 12, color: COLORS.dark }}>{m.title}</span>
                          <span style={{ color: COLORS.mid, fontSize: 14, fontWeight: 300 }}>{methodOpen === key ? "−" : "+"}</span>
                        </button>
                        {methodOpen === key && (
                          <div style={{ padding: "0 14px 12px", fontSize: 11, color: COLORS.gray, lineHeight: 1.7 }}>{m.text}</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* FOOTER */}
      <div style={{ padding: "8px 24px 16px", display: "flex", justifyContent: "space-between", fontSize: 10, color: COLORS.lightGray }}>
        <span>Generated from LinkedIn profile data · Classification based on titles, companies & headlines</span>
        <span>Recruiting Intelligence Report</span>
      </div>

      {/* ═══════ FLOATING AI CHAT BUTTON + PANEL ═══════ */}
      <button
        onClick={() => setChatOpen(!chatOpen)}
        style={{
          position: "fixed", bottom: 20, right: 20, width: 48, height: 48, borderRadius: "50%",
          background: COLORS.dark, border: chatOpen ? `2px solid ${COLORS.mint}` : "2px solid transparent",
          color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          boxShadow: "0 4px 16px rgba(26,60,52,0.3)", transition: "all 0.2s", zIndex: 1000,
        }}
        title="AI Recruiting Assistant"
      >
        {chatOpen
          ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        }
      </button>

      {chatOpen && (
        <div style={{
          position: "fixed", bottom: 80, right: 20, width: 400, maxHeight: "65vh",
          borderRadius: 14, overflow: "hidden", display: "flex", flexDirection: "column",
          boxShadow: "0 8px 40px rgba(26,60,52,0.25)", border: `1px solid ${COLORS.border}`,
          zIndex: 999, background: "#fff",
        }}>
          <div style={{ background: COLORS.dark, padding: "12px 16px", flexShrink: 0, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#fff" }}>AI Recruiting Assistant</div>
              <div style={{ fontSize: 9.5, color: "#A0C8B0" }}>{a.total} attendees loaded</div>
            </div>
            <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: COLORS.mint }} />
              <span style={{ fontSize: 9, color: COLORS.mint }}>Ready</span>
            </div>
          </div>

          <div style={{ flex: 1, overflowY: "auto", padding: 12, display: "flex", flexDirection: "column", gap: 8, minHeight: 180, maxHeight: "calc(65vh - 120px)" }}>
            {chatMessages.length === 0 && (
              <div style={{ display: "flex", flexDirection: "column", gap: 6, padding: "4px 0" }}>
                <div style={{ fontSize: 11, color: COLORS.gray, marginBottom: 2 }}>Suggested questions:</div>
                {[
                  "Find the top 10 candidates to contact first",
                  "Write an outreach message for McKinsey attendees",
                  "Who are the strongest Data/AI profiles?",
                  "List uncontacted candidates from Europe in consulting",
                ].map((q, i) => (
                  <button key={i} onClick={() => setChatInput(q)} style={{
                    padding: "7px 10px", borderRadius: 7, border: `1px solid ${COLORS.border}`,
                    background: COLORS.cream, cursor: "pointer", textAlign: "left", fontSize: 10.5,
                    color: COLORS.dark, lineHeight: 1.4, fontFamily: "inherit",
                  }}>{q}</button>
                ))}
              </div>
            )}
            {chatMessages.map((msg, i) => (
              <div key={i} style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start" }}>
                <div style={{
                  maxWidth: "88%", padding: msg.role === "user" ? "8px 12px" : "10px 14px",
                  borderRadius: msg.role === "user" ? "10px 10px 2px 10px" : "10px 10px 10px 2px",
                  background: msg.role === "user" ? COLORS.dark : COLORS.cream,
                  color: msg.role === "user" ? "#fff" : COLORS.dark,
                  fontSize: 11, lineHeight: 1.6,
                }}>
                  {msg.role === "user" ? msg.content : renderMarkdown(msg.content)}
                </div>
              </div>
            ))}
            {chatLoading && (
              <div style={{ display: "flex", gap: 4, padding: "8px 12px", background: COLORS.cream, borderRadius: 10, width: "fit-content" }}>
                {[0,1,2].map(i => (
                  <span key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: COLORS.mid, animation: `cpulse 1.2s ease-in-out ${i*0.2}s infinite` }} />
                ))}
                <style>{`@keyframes cpulse { 0%,100% { opacity:0.2; } 50% { opacity:1; } }`}</style>
              </div>
            )}
          </div>

          <div style={{ padding: "8px 12px", borderTop: `1px solid ${COLORS.border}`, display: "flex", gap: 6, flexShrink: 0 }}>
            <input
              value={chatInput}
              onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } }}
              placeholder="Ask about your attendees..."
              style={{ flex: 1, padding: "8px 10px", borderRadius: 7, border: `1px solid ${COLORS.border}`, fontSize: 11, fontFamily: "inherit", outline: "none", background: COLORS.cream, color: COLORS.dark }}
            />
            <button
              onClick={sendChat}
              disabled={chatLoading || !chatInput.trim()}
              style={{ padding: "8px 14px", borderRadius: 7, border: "none", background: chatLoading || !chatInput.trim() ? COLORS.border : COLORS.dark, color: "#fff", cursor: chatLoading ? "wait" : "pointer", fontWeight: 600, fontSize: 10.5, fontFamily: "inherit" }}
            >Send</button>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
